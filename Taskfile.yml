# go-task / taskfile.dev runner. Run `task --list` to see every command.
#
# NOTE: "task" here means the go-task runner, NOT the Task domain entity this
# demo manages. The CRUD entity is unrelated to this file's tasks.
version: "3"

env:
  # Default local connection — matches compose.yaml (Postgres on host port 5433).
  DATABASE_URL: postgres://postgres:postgres@localhost:5433/tasks?sslmode=disable

tasks:
  db-up:
    desc: Start BOTH Postgres containers — app DB (5433) and Atlas dev DB (5434).
    cmds:
      - podman compose up -d

  db-down:
    desc: Stop and remove both Postgres containers.
    cmds:
      - podman compose down

  run:
    desc: Run the HTTP server (reads PORT and DATABASE_URL from the environment).
    cmds:
      - go run ./cmd/server

  migrate-diff:
    desc: Generate a versioned migration from the Bun model (uses the dev DB on 5434 to compute the diff). Needs the dev DB up.
    cmds:
      - atlas migrate diff --env bun

  migrate-apply:
    desc: Apply pending migrations to the app DB on 5433.
    cmds:
      - atlas migrate apply --env bun -u "$DATABASE_URL"

  migrate-status:
    desc: Show which migrations have been applied to the app DB on 5433.
    cmds:
      - atlas migrate status --env bun -u "$DATABASE_URL"

  test:
    desc: Run the fast unit tests (no database required).
    cmds:
      - go test ./...

  test-integration:
    desc: Run DB integration tests against the podman Postgres (app DB on 5433)
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5433/tasks?sslmode=disable
    cmds:
      - go test -tags=integration ./...
