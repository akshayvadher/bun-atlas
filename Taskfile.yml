# go-task / taskfile.dev runner. Run `task --list` to see every command.
#
# NOTE: "task" here means the go-task runner, NOT the Task domain entity this
# demo manages. The CRUD entity is unrelated to this file's tasks.
version: "3"

env:
  # Default local connection — matches compose.yaml (Postgres on host port 5433).
  DATABASE_URL: postgres://postgres:postgres@localhost:5433/tasks?sslmode=disable

tasks:
  db-up:
    desc: Start the app Postgres (5433). Atlas's dev DB is spun up ephemerally per diff — no separate container.
    cmds:
      - podman compose up -d

  db-down:
    desc: Stop and remove the app Postgres container.
    cmds:
      - podman compose down

  run:
    desc: Run the HTTP server (reads PORT and DATABASE_URL from the environment).
    cmds:
      - go run ./cmd/server

  migrate-diff:
    desc: Generate a versioned migration from the Bun models. Atlas spins an ephemeral dev DB via podman to compute the diff. Pass a name with `task migrate-diff -- add_priority`.
    env:
      # Atlas's docker:// dev DB talks to the Docker API. Point it at podman's
      # Docker-compatible socket. Respects an already-set DOCKER_HOST (e.g. a
      # podman-machine pipe on Windows/macOS) and otherwise defaults to the
      # common rootful Linux path.
      DOCKER_HOST:
        sh: echo "${DOCKER_HOST:-unix:///run/podman/podman.sock}"
    cmds:
      # {{.CLI_ARGS}} forwards anything after `--` as the migration name.
      # With no name, Atlas auto-generates one from a timestamp.
      - atlas migrate diff {{.CLI_ARGS}} --env bun

  migrate-apply:
    desc: Apply pending migrations to the app DB on 5433.
    cmds:
      - atlas migrate apply --env bun -u "$DATABASE_URL"

  migrate-status:
    desc: Show which migrations have been applied to the app DB on 5433.
    cmds:
      - atlas migrate status --env bun -u "$DATABASE_URL"

  migrate-validate:
    desc: Validate migration directory integrity (atlas.sum + replayable SQL). Uses the ephemeral podman dev DB.
    env:
      DOCKER_HOST:
        sh: echo "${DOCKER_HOST:-unix:///run/podman/podman.sock}"
    cmds:
      - atlas migrate validate --env bun

  migrate-lint:
    desc: "Lint the latest migration for destructive/unsafe changes. NOTE: since Atlas v0.38 this requires `atlas login` (free). Uses the ephemeral podman dev DB."
    env:
      DOCKER_HOST:
        sh: echo "${DOCKER_HOST:-unix:///run/podman/podman.sock}"
    cmds:
      - atlas migrate lint --env bun --latest 1

  migrate-new:
    desc: Create an empty MANUAL migration (data seed / custom SQL). Pass a name, edit the file, then run `task migrate-hash`. e.g. `task migrate-new -- seed_tasks`.
    cmds:
      - atlas migrate new {{.CLI_ARGS}} --dir "file://migrations"

  migrate-hash:
    desc: Recompute migrations/atlas.sum after hand-editing a migration file.
    cmds:
      - atlas migrate hash --dir "file://migrations"

  test:
    desc: Run the fast unit tests (no database required).
    cmds:
      - go test ./...

  test-integration:
    desc: Run DB integration tests against the podman Postgres (app DB on 5433)
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5433/tasks?sslmode=disable
    cmds:
      - go test -tags=integration ./...
