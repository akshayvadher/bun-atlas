# Postgres for the Atlas + Bun CRUD demo. Podman-compatible (works with
# `podman compose up` and `docker compose up`).
#
# Two databases, two purposes:
#   - postgres      (host port 5433): the APP database. Migrations are applied
#                    here and the server connects to it. Data persists.
#   - postgres-dev  (host port 5434): a THROWAWAY scratch database Atlas uses to
#                    compute migration diffs (`atlas migrate diff`). Atlas resets
#                    it on every run; it holds no app data. It exists because
#                    this host has podman only (no docker CLI), so atlas.hcl
#                    points `dev` at this container instead of "docker://...".
#
# Host ports 5433/5434 are intentional: they avoid clashing with a default
# local Postgres on 5432. Credentials/db name match the default DATABASE_URL:
#   postgres://postgres:postgres@localhost:5433/tasks?sslmode=disable
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasks"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-dev:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dev
    ports:
      - "5434:5432"
    # No volume: this is a scratch DB Atlas resets on every diff. Nothing here
    # needs to survive a restart.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
